services:

  # Mock OIDC provider - stands in for Ping locally
  dex:
    image: ghcr.io/dexidp/dex:latest
    container_name: dex
    ports:
      - "5556:5556"
    volumes:
      - ./config/dex.yaml:/etc/dex/config.yaml:ro
    command: dex serve /etc/dex/config.yaml

  # Your Node.js team sync + auth proxy service
  team-sync:
    build: ./team-sync
    volumes:
      - ./team-sync:/app
      - /team-sync/node_modules  # prevent host from overwriting container's node_modules
      - ./sessions:/app/sessions # keep sessions after the team sync restarts
    command: npx nodemon index.js
    container_name: team-sync
    environment:
      - OIDC_ISSUER_INTERNAL=http://dex:5556/dex    # for server-to-server (token validation)
      - OIDC_ISSUER_EXTERNAL=http://localhost:8080/dex  # what goes in the browser redirect URL
      - OIDC_CLIENT_ID=grafana-proxy
      - OIDC_CLIENT_SECRET=supersecret
      - OIDC_REDIRECT_URI=http://localhost:8080/callback
      - GRAFANA_URL=http://grafana:3000
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
      - SESSION_SECRET=localdevsecret
      - PORT=3001
      - GRAFANA_API_AUTH=admin:admin
      - ENSURE_TEAMS=true
      - COOKIE_SECRET=some-long-random-string-here      
      - GRAFANA_ADMIN_GROUPS=sre-owners-np
      - GRAFANA_VIEWER_GROUPS=sales-viewers-np      
    depends_on:
      - dex
      - grafana

  # nginx - sits in front of everything, enforces auth headers
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:8080"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - team-sync
      - grafana

  # Grafana Enterprise (no license key = OSS feature set, same image you use in prod)
  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: grafana
    environment:
      - GF_SERVER_ROOT_URL=http://localhost:8080
      - GF_AUTH_PROXY_ENABLED=true
      - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      - GF_AUTH_PROXY_HEADER_PROPERTY=username
      - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      - GF_AUTH_PROXY_SYNC_TTL=60
      - GF_AUTH_PROXY_HEADERS=Name:X-WEBAUTH-NAME Email:X-WEBAUTH-EMAIL Role:X-WEBAUTH-ROLE
      # Disable the built-in login UI so users can't bypass the proxy
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      # Allow grafana API calls with service account token from team-sync
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    # NOT exposed to host directly - only reachable via nginx
    expose:
      - "3000"

volumes:
  grafana_data: